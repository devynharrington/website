{{ if .TableOfContents }}
  <details class="toc mt-0 mb-8 rounded-lg border border-neutral-300/60 dark:border-neutral-700 bg-neutral-50/40 dark:bg-neutral-900/30 lg:hidden" open>
    <summary
      class="block px-4 py-3 text-lg font-semibold cursor-pointer text-neutral-800 dark:text-neutral-100">
      {{ i18n "article.table_of_contents" }}
    </summary>
    <div class="px-4 pb-4">
      {{ .TableOfContents | emojify }}
    </div>
  </details>

  <details
    open
    id="TOCView"
    class="toc-right mt-0 overflow-y-auto overscroll-contain bf-scrollbar rounded-xl border border-neutral-300/60 dark:border-neutral-700 bg-neutral-50/40 dark:bg-neutral-900/30 px-4 py-3 hidden lg:block">
    <summary
      class="block py-1 text-lg font-semibold cursor-pointer text-neutral-800 dark:text-neutral-100">
      {{ i18n "article.table_of_contents" }}
    </summary>
    <div
      class="min-w-[220px] py-2 border-dotted border-s-1 ps-4 dark:border-neutral-600">
      {{ .TableOfContents | emojify }}
    </div>
  </details>
{{ end }}
