<div style="margin-top:-12px; margin-bottom:18px; font-size:14px; opacity:0.85;">
  👁 <span id="dh-views">–</span> views • ⏱ {{ .ReadingTime }} min read
</div>

<script>
(async function () {
  const el = document.getElementById("dh-views");
  if (!el) return;

  try {
    // Normalize to match the server: remove trailing slash except root
    let path = window.location.pathname;
    if (path.length > 1) path = path.replace(/\/+$/, "");

    const res = await fetch(`/api/views?path=${encodeURIComponent(path)}`, { cache: "no-store" });
    const data = await res.json();

    const num = (data && typeof data.views === "number") ? data.views : 0;
    el.textContent = num.toLocaleString();
  } catch (e) {
    el.textContent = "–";
  }
})();
</script>
